<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Practice</title>
</head>
<body>

<h1>JavaScript Practice Output</h1>
<pre id="output"></pre>

<script>

document.write("SECTION 1 – If / If Else <br><br>");

//1
let num = 15;
if(num > 10){
    document.write("Number is big <br>");
}

//2
let age = 20;
if(age >= 18){
    document.write("Eligible to vote <br>");
}else{
    document.write("Not eligible to vote <br>");
}

//3
let temperature = 35;
if(temperature > 30){
    document.write("Hot <br>");
}else{
    document.write("Cool <br>");
}

//4
let number = -5;
if(number >= 0){
    document.write("Positive <br>");
}else{
    document.write("Negative <br>");
}

//5
let n = 8;
if(n % 2 == 0){
    document.write("Even <br>");
}else{
    document.write("Odd <br>");
}

document.write("<br>SECTION 2 – Else If <br><br>");

//1
let marks = 85;

if(marks >= 90){
    document.write("Grade A <br>");
}
else if(marks >= 70){
    document.write("Grade B <br>");
}
else if(marks >= 50){
    document.write("Grade C <br>");
}
else{
    document.write("Fail <br>");
}

//2
let hour = 14;

if(hour < 12){
    document.write("Morning <br>");
}
else if(hour < 17){
    document.write("Afternoon <br>");
}
else if(hour < 21){
    document.write("Evening <br>");
}
else{
    document.write("Night <br>");
}

//3
let num2 = 0;

if(num2 > 0){
    document.write("Positive <br>");
}
else if(num2 < 0){
    document.write("Negative <br>");
}
else{
    document.write("Zero <br>");
}

//4
let score = 80;

if(score >= 100){
    document.write("Winner <br>");
}
else if(score >= 50){
    document.write("Good <br>");
}
else{
    document.write("Try again <br>");
}

//5 Largest of 3 numbers
let a = 10, b = 25, c = 15;

if(a > b && a > c){
    document.write("Largest: " + a + "<br>");
}
else if(b > a && b > c){
    document.write("Largest: " + b + "<br>");
}
else{
    document.write("Largest: " + c + "<br>");
}

document.write("<br>SECTION 3 – Switch <br><br>");

//1
let day = 1;

switch(day){
case 1:
document.write("Monday <br>");
break;

case 2:
document.write("Tuesday <br>");
break;

case 3:
document.write("Wednesday <br>");
break;

case 4:
document.write("Thursday <br>");
break;

case 5:
document.write("Friday <br>");
break;

case 6:
document.write("Saturday <br>");
break;

case 7:
document.write("Sunday <br>");
break;
}

//2
let trafficLight = "Red";

switch(trafficLight){
case "Red":
document.write("Stop <br>");
break;

case "Yellow":
document.write("Ready <br>");
break;

case "Green":
document.write("Go <br>");
break;
}

//3
let month = "December";

switch(month){

case "December":
case "January":
case "February":
document.write("Winter <br>");
break;

case "March":
case "April":
case "May":
document.write("Summer <br>");
break;

case "June":
case "July":
case "August":
document.write("Rainy <br>");
break;
}

//4
let role = "Admin";

switch(role){

case "Admin":
document.write("Full Access <br>");
break;

case "User":
document.write("Limited Access <br>");
break;

case "Guest":
document.write("View Only <br>");
break;
}

//5
let grade = "A";

switch(grade){

case "A":
document.write("Excellent <br>");
break;

case "B":
document.write("Good <br>");
break;

case "C":
document.write("Average <br>");
break;

default:
document.write("Needs Improvement <br>");
}

document.write("<br>SECTION 4 – For Loop <br><br>");

//1
for(let i=1;i<=10;i++){
document.write(i + " ");
}

document.write("<br>");

//2
for(let i=10;i>=1;i--){
document.write(i + " ");
}

document.write("<br>");

//3 Even
for(let i=1;i<=20;i++){
if(i%2==0){
document.write(i + " ");
}
}

document.write("<br>");

//4 Odd
for(let i=1;i<=20;i++){
if(i%2!=0){
document.write(i + " ");
}
}

document.write("<br>");

//5 Table
for(let i=1;i<=10;i++){
document.write("5 x "+i+" = "+(5*i)+"<br>");
}

document.write("<br>SECTION 5 – While Loop <br><br>");

//1
let i=1;
while(i<=5){
document.write(i+" ");
i++;
}

document.write("<br>");

//2
let j=5;
while(j>=1){
document.write(j+" ");
j--;
}

document.write("<br>");

//3 Even numbers
let k=1;
while(k<=10){
if(k%2==0){
document.write(k+" ");
}
k++;
}

document.write("<br>");

//4 Sum
let sum=0;
let s=1;

while(s<=10){
sum=sum+s;
s++;
}
document.write("Sum = "+sum+"<br>");

//5 Square
let sq=1;
while(sq<=5){
document.write((sq*sq)+" ");
sq++;
}

document.write("<br><br>SECTION 6 – Do While <br><br>");

//1
let d=1;
do{
document.write(d+" ");
d++;
}
while(d<=5);

document.write("<br>");

//2
let d2=5;
do{
document.write(d2+" ");
d2--;
}
while(d2>=1);

document.write("<br>");

//3 multiples of 3
let m=3;
do{
document.write(m+" ");
m+=3;
}
while(m<=30);

document.write("<br>");

//4 divisible by 4
let dv=1;
do{
if(dv%4==0){
document.write(dv+" ");
}
dv++;
}
while(dv<=20);

document.write("<br>");

//5 until 10
let t=1;
do{
document.write(t+" ");
t++;
}
while(t<=10);

document.write("<br><br>SECTION 7 – For Of <br><br>");

//1
let str="javascript";

for(let ch of str){
document.write(ch+" ");
}

document.write("<br>");

//2
let fruits=["apple","banana","orange"];

for(let fruit of fruits){
document.write(fruit+" ");
}

document.write("<br>");

//3 count
let count=0;

for(let c1 of str){
count++;
}

document.write("Characters = "+count+"<br>");

//4 vowels
for(let ch of str){
if("aeiou".includes(ch)){
document.write(ch+" ");
}
}

document.write("<br>");

//5 sum array
let arr=[10,20,30];
let total=0;

for(let n1 of arr){
total+=n1;
}

document.write("Sum = "+total+"<br>");

document.write("<br>SECTION 8 – For In <br><br>");

let student={
name:"Rahul",
age:21,
department:"CSE"
};

//values
for(let key in student){
document.write(student[key]+" ");
}

document.write("<br>");

//keys
for(let key in student){
document.write(key+" ");
}

document.write("<br>");

//key value
for(let key in student){
document.write(key+" : "+student[key]+"<br>");
}

document.write("<br>SECTION 9 – Functions <br><br>");

function add(a,b){
return a+b;
}

document.write("Addition = "+add(10,5)+"<br>");

function square(num){
return num*num;
}

document.write("Square = "+square(6)+"<br>");

</script>

</body>
</html>
