<!DOCTYPE html>
<html>
<head>
<title>JavaScript Practice</title>
</head>
<body>

<h2>Open Console to See Output</h2>

<script>

// ================= SECTION 1 =================
console.log("SECTION 1 – If / If Else");

//1
let num = 15;
if(num > 10){
console.log("Number is big");
}

//2
let age = 20;
if(age >= 18){
console.log("Eligible to vote");
}else{
console.log("Not eligible to vote");
}

//3
let temperature = 35;
if(temperature > 30){
console.log("Hot");
}else{
console.log("Cool");
}

//4
let number = -5;
if(number >= 0){
console.log("Positive");
}else{
console.log("Negative");
}

//5
let n = 8;
if(n % 2 == 0){
console.log("Even");
}else{
console.log("Odd");
}


// ================= SECTION 2 =================
console.log("SECTION 2 – Else If");

//1
let marks = 75;

if(marks >= 90){
console.log("Grade A");
}
else if(marks >= 70){
console.log("Grade B");
}
else if(marks >= 50){
console.log("Grade C");
}
else{
console.log("Fail");
}

//2
let hour = 14;

if(hour < 12){
console.log("Morning");
}
else if(hour < 17){
console.log("Afternoon");
}
else if(hour < 21){
console.log("Evening");
}
else{
console.log("Night");
}

//3
let num2 = 0;

if(num2 > 0){
console.log("Positive");
}
else if(num2 < 0){
console.log("Negative");
}
else{
console.log("Zero");
}

//4
let score = 80;

if(score >= 100){
console.log("Winner");
}
else if(score >= 50){
console.log("Good");
}
else{
console.log("Try again");
}

//5 Largest among 3 numbers
let a = 10, b = 25, c = 15;

if(a > b && a > c){
console.log("Largest:", a);
}
else if(b > a && b > c){
console.log("Largest:", b);
}
else{
console.log("Largest:", c);
}


// ================= SECTION 3 =================
console.log("SECTION 3 – Switch");

//1 Day
let day = 1;

switch(day){
case 1:
console.log("Monday");
break;

case 2:
console.log("Tuesday");
break;

case 3:
console.log("Wednesday");
break;

case 4:
console.log("Thursday");
break;

case 5:
console.log("Friday");
break;

case 6:
console.log("Saturday");
break;

case 7:
console.log("Sunday");
break;
}

//2 Traffic Light
let trafficLight = "Red";

switch(trafficLight){
case "Red":
console.log("Stop");
break;

case "Yellow":
console.log("Ready");
break;

case "Green":
console.log("Go");
break;
}

//3 Month Season
let month = "December";

switch(month){
case "December":
case "January":
case "February":
console.log("Winter");
break;

case "March":
case "April":
case "May":
console.log("Summer");
break;

case "June":
case "July":
case "August":
console.log("Rainy");
break;
}

//4 Role
let role = "Admin";

switch(role){
case "Admin":
console.log("Full Access");
break;

case "User":
console.log("Limited Access");
break;

case "Guest":
console.log("View Only");
break;
}

//5 Grade
let grade = "A";

switch(grade){
case "A":
console.log("Excellent");
break;

case "B":
console.log("Good");
break;

case "C":
console.log("Average");
break;

default:
console.log("Needs Improvement");
}


// ================= SECTION 4 =================
console.log("SECTION 4 – For Loop");

//1
for(let i=1;i<=10;i++){
console.log(i);
}

//2
for(let i=10;i>=1;i--){
console.log(i);
}

//3 Even
for(let i=1;i<=20;i++){
if(i%2==0){
console.log(i);
}
}

//4 Odd
for(let i=1;i<=20;i++){
if(i%2!=0){
console.log(i);
}
}

//5 Table of 5
for(let i=1;i<=10;i++){
console.log("5 x",i,"=",5*i);
}


// ================= SECTION 5 =================
console.log("SECTION 5 – While Loop");

//1
let i=1;
while(i<=5){
console.log(i);
i++;
}

//2
let j=5;
while(j>=1){
console.log(j);
j--;
}

//3 Even numbers
let k=1;
while(k<=10){
if(k%2==0){
console.log(k);
}
k++;
}

//4 Sum
let sum=0;
let s=1;

while(s<=10){
sum=sum+s;
s++;
}

console.log("Sum =",sum);

//5 Square
let sq=1;

while(sq<=5){
console.log(sq*sq);
sq++;
}


// ================= SECTION 6 =================
console.log("SECTION 6 – Do While");

//1
let d=1;

do{
console.log(d);
d++;
}
while(d<=5);

//2
let d2=5;

do{
console.log(d2);
d2--;
}
while(d2>=1);

//3 Multiples of 3
let m=3;

do{
console.log(m);
m+=3;
}
while(m<=30);

//4 Divisible by 4
let dv=1;

do{
if(dv%4==0){
console.log(dv);
}
dv++;
}
while(dv<=20);

//5 Until 10
let t=1;

do{
console.log(t);
t++;
}
while(t<=10);


// ================= SECTION 7 =================
console.log("SECTION 7 – For Of");

//1
let str="javascript";

for(let ch of str){
console.log(ch);
}

//2
let fruits=["apple","banana","orange"];

for(let fruit of fruits){
console.log(fruit);
}

//3 Count characters
let count=0;

for(let c1 of str){
count++;
}

console.log("Characters =",count);

//4 Vowels
for(let ch of str){
if("aeiou".includes(ch)){
console.log(ch);
}
}

//5 Sum array
let arr=[10,20,30];
let total=0;

for(let num1 of arr){
total+=num1;
}

console.log("Sum =",total);


// ================= SECTION 8 =================
console.log("SECTION 8 – For In");

let student={
name:"Rahul",
age:21,
department:"CSE"
};

//values
for(let key in student){
console.log(student[key]);
}

//keys
for(let key in student){
console.log(key);
}

//key value
for(let key in student){
console.log(key,":",student[key]);
}


// ================= SECTION 9 =================
console.log("SECTION 9 – Functions");

function add(a,b){
return a+b;
}

console.log("Addition =",add(10,5));

function square(num){
return num*num;
}

console.log("Square =",square(6));

</script>

</body>
</html>
